      value: cooperative-sticky
    - name: KAFKA_PROPERTIES_SASL_USERNAME
      value: datahub
    - name: KAFKA_PROPERTIES_SASL_PASSWORD
      valueFrom:
        secretKeyRef:
          name: data-governance-kafka-secrets
          key: client-password
{%- endraw %}
