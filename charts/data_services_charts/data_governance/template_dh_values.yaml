{%- raw %}
    gms:
      protocol: "http"
      port: "8080"
      nodePort: "30001"

    # Used for scheduled tasks
    timezone: "UTC"

    frontend:
      validateSignUpEmail: false
    monitoring:
      enablePrometheus: false
      # Set a custom name for the monitoring port
      portName: jmx
      # Change if using a service like AKS where it uses a different API namespace for monitoring.coreos.com
      # monitoringApiVersion: "azmonitoring.coreos.com/v1"
      # Prometheus scrape layout for JMX workloads (GMS, frontend, MAE/MCE consumers).
      # - legacy: JMX on jmxPort; GMS Spring actuator on main http service port only.
      # - jmx_and_actuator: JMX with explicit metricsPath on jmxPort; /actuator/prometheus on actuatorPrometheusPort (default; matches v1.6.0 Docker).
      # - actuator_only: no JMX; /actuator/prometheus only on actuatorPrometheusPort where the app exposes it.
      # When jmx_and_actuator or actuator_only: MAE/MCE consumers probe /actuator/health on the
      # prometheus Service/container port (actuatorPrometheusPort); allow that port if you use NetworkPolicy.
      metricsMode: jmx_and_actuator
      jmxPort: 4318
      # Dedicated listener for Spring /actuator/prometheus (non-legacy modes). Independent of jmxPort so JMX can be removed later.
      actuatorPrometheusPort: 4319
      jmxExporter:
        metricsPath: "/metrics"
    mae_consumer:
      port: "9091"
      nodePort: "30002"

    appVersion: "1.6.0"
    systemUpdate:
      ## The following options control settings for datahub-upgrade job which will
      ## managed ES indices and other update related work
      enabled: true
      # When true: skip legacy elasticsearch/kafka/mysql/postgresql SetupJob hooks; run SQL and Elasticsearch
      # setup via the system-update job (see datahubSystemUpdate.sql / elasticsearch). Legacy hooks stay off
      # unless consolidatedUpgrade is set false. Java KubernetesScaleDownStep applies when scaleDown is enabled.
      consolidatedUpgrade: true
      # K8 scale-down (available in v1.5.0): when true, Java-based scale-down runs (KubernetesScaleDownStep)
      # NOTE: scaleDown is automatically disabled when zdu.enable=true
      scaleDown:
        enabled: true
      # Zero Downtime Upgrade (ZDU) group flags — each stage enables a set of individual feature flags.
      # Individual flags can still be overridden separately (e.g. via global.elasticsearch.index.upgrade).
      zdu:
        # ZDU_STAGE_10: group flag for pre-enablement stage.
        # Enables: CREATE_SCHEMA_VERSION_INDEX (schema version index on metadata_aspect_v2)
        preEnable: true
        # ZDU_STAGE_20: group flag for first ZDU release.
        # Enables: ELASTICSEARCH_BUILD_INDICES_INCREMENTAL_REINDEX_ENABLED,
        #          ELASTICSEARCH_BUILD_INDICES_ROLLBACK_DUAL_WRITE_ENABLED,
        #          SYSTEM_UPDATE_MIGRATE_ASPECTS_ENABLED,
        #          ASPECT_MIGRATION_MUTATOR_ENABLED (GMS runtime)
        # NOTE: setting enable=true automatically disables scaleDown operations
        enable: false

    encryptionKey:
      secretRef: "data-governance-datahub-encryption-secrets"
      secretKey: "encryption_key_secret"
      # Set to false if you'd like to provide your own secret.
      provisionSecret:
        enabled: false
        autoGenerate: false
        annotations: {}
        # Only specify if autoGenerate set to false
        #  secretValues:
        #    encryptionKey: <encryption key value>
    managed_ingestion:
      enabled: true
      defaultCliVersion: "1.6.0"

    metadata_service_authentication:
      enabled: true
      systemClientId: "__datahub_system"
      systemClientSecret:
        secretRef: "data-governance-datahub-auth-secrets"
        secretKey: "system_client_secret"
      tokenService:
        signingKey:
          secretRef: "data-governance-datahub-auth-secrets"
          secretKey: "token_service_signing_key"
        salt:
          secretRef: "data-governance-datahub-auth-secrets"
          secretKey: "token_service_salt"
      # Set to false if you'd like to provide your own auth secrets
      provisionSecrets:
        enabled: false
        autoGenerate: false
        annotations: {}
      # Only specify if autoGenerate set to false
      #  secretValues:
      #    secret: <secret value>
      #    signingKey: <signing key value>
      #    salt: <salt value>

    ## Enables always emitting a MCL even when no changes are detected. Used for Time Based Lineage when no changes occur.
    alwaysEmitChangeLog: false

    ## Enables diff mode for graph writes, uses a different code path that produces a diff from previous to next to write relationships instead of wholesale deleting edges and reading
    enableGraphDiffMode: true

    ## Enable stricter URN validation logic
    strictUrnValidation: false

    ## Values specific to the unified search and browse feature.
    search_and_browse:
      show_search_v2: true  # If on, show the new search filters experience as of v0.10.5
      show_browse_v2: true  # If on, show the new browse experience as of v0.10.5
      backfill_browse_v2: true  # If on, run the backfill upgrade job that generates default browse paths for relevant entities

    ## v0.15.0+
    metadataChangeProposal:
      consumer:
        batch:
          enabled: false


    ## v0.13.4+
    mcp:
      throttle:
        # updateIntervalMs: 60000
        mceConsumer:  # v0.14.2+
          enabled: false
        apiRequests:  # v0.14.2+
          enabled: false
        ## Versioned MCL topic
        versioned:
          ## Whether to throttle MCP processing based on MCL backlog
          enabled: true
        #  threshold: 4000
        #  maxAttempts: 1000
        #  initialIntervalMs: 100
        #  multiplier: 10
        #  maxIntervalMs:  30000
        # Timeseries MCL topic
        timeseries:
          ## Whether to throttle MCP processing based on MCL backlog
          enabled: false
        #  threshold: 4000
        #  maxAttempts: 1000
        #  initialIntervalMs: 100
        #  multiplier: 10
        #  maxIntervalMs: 30000

    ## v0.15.0+
    entityVersioning:
      enabled: false

    ## Enables a fast path for processing events sourced from the UI, updates indices synchronously for requests originating from GraphQL
    preProcessHooksUIEnabled: true
    ## Reprocess UI events at MAE Consumer, normally if preprocess is enabled this is not required.
    reProcessUIEventHooks: false

