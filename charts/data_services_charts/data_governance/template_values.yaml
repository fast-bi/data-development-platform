- apiVersion: v1
  kind: ConfigMap
  metadata:
    name: data-governance-actions-kafka-config
    namespace: "{{ namespace }}"
  data:
{%- raw %}
    doc_propagation_action.yaml: |
      name: ${DATAHUB_ACTIONS_DOC_PROPAGATION_CONSUMER_GROUP_ID:-datahub_doc_propagation_action}
      enabled: ${DATAHUB_ACTIONS_DOC_PROPAGATION_ENABLED:-true}
      source:
        type: 'kafka'
        config:
          connection:
            bootstrap: ${KAFKA_BOOTSTRAP_SERVER:-localhost:9092}
            schema_registry_url: ${SCHEMA_REGISTRY_URL:-http://localhost:8081}
            consumer_config:
              max.poll.interval.ms: ${MAX_POLL_INTERVAL_MS:-60000}
              security.protocol: ${KAFKA_PROPERTIES_SECURITY_PROTOCOL:-SASL_PLAINTEXT}
              sasl.mechanism: ${KAFKA_PROPERTIES_SASL_MECHANISM:-PLAIN}
              sasl.username: ${KAFKA_PROPERTIES_SASL_USERNAME}
              sasl.password: ${KAFKA_PROPERTIES_SASL_PASSWORD}
              partition.assignment.strategy: cooperative-sticky
          topic_routes:
            mcl: ${METADATA_CHANGE_LOG_VERSIONED_TOPIC_NAME:-MetadataChangeLog_Versioned_v1}
            pe: ${PLATFORM_EVENT_TOPIC_NAME:-PlatformEvent_v1}
      action:
        type: doc_propagation
        config:
          columns_enabled: ${DATAHUB_ACTIONS_DOC_PROPAGATION_COLUMNS_ENABLED:-true}
          max_propagation_depth: ${DATAHUB_ACTIONS_DOC_PROPAGATION_MAX_PROPAGATION_DEPTH:-5}
          max_propagation_fanout: ${DATAHUB_ACTIONS_DOC_PROPAGATION_MAX_PROPAGATION_FANOUT:-1000}
          max_propagation_time_millis: ${DATAHUB_ACTIONS_DOC_PROPAGATION_MAX_PROPAGATION_TIME_MILLIS:-3600000}
          rate_limit_propagated_writes: ${DATAHUB_ACTIONS_DOC_PROPAGATION_RATE_LIMIT_PROPAGATED_WRITES:-1500}
          rate_limit_propagated_writes_period: ${DATAHUB_ACTIONS_DOC_PROPAGATION_RATE_LIMIT_PROPAGATED_WRITES_PERIOD:-15}
      datahub:
        server: 'http://${DATAHUB_GMS_HOST:-localhost}:${DATAHUB_GMS_PORT:-8080}'
        extra_headers:
          Authorization: 'Basic ${DATAHUB_SYSTEM_CLIENT_ID:-__datahub_system}:${DATAHUB_SYSTEM_CLIENT_SECRET:-JohnSnowKnowsNothing}'
    executor.yaml: |
      name: ${DATAHUB_ACTIONS_INGESTION_EXECUTOR_CONSUMER_GROUP_ID:-ingestion_executor}
      source:
        type: "kafka"
        config:
          connection:
            bootstrap: ${KAFKA_BOOTSTRAP_SERVER:-localhost:9092}
            schema_registry_url: ${SCHEMA_REGISTRY_URL:-http://localhost:8081}
            consumer_config:
              security.protocol: ${KAFKA_PROPERTIES_SECURITY_PROTOCOL:-SASL_PLAINTEXT}
              sasl.mechanism: ${KAFKA_PROPERTIES_SASL_MECHANISM:-PLAIN}
              sasl.username: ${KAFKA_PROPERTIES_SASL_USERNAME}
              sasl.password: ${KAFKA_PROPERTIES_SASL_PASSWORD}
              partition.assignment.strategy: cooperative-sticky
          topic_routes:
            mcl: ${METADATA_CHANGE_LOG_VERSIONED_TOPIC_NAME:-MetadataChangeLog_Versioned_v1}
            pe: ${PLATFORM_EVENT_TOPIC_NAME:-PlatformEvent_v1}
      filter:
        event_type: "MetadataChangeLogEvent_v1"
        event:
          entityType: "dataHubExecutionRequest"
          changeType: "UPSERT"
          aspectName:
            - "dataHubExecutionRequestInput"
            - "dataHubExecutionRequestSignal"
          aspect:
            value:
              executorId: "${EXECUTOR_ID:-default}"
      action:
        type: "executor"
        config:
          executor_id: "${EXECUTOR_ID:-default}"
      datahub:
        server: "${DATAHUB_GMS_PROTOCOL:-http}://${DATAHUB_GMS_HOST:-localhost}:${DATAHUB_GMS_PORT:-8080}"
        extra_headers:
          Authorization: "Basic ${DATAHUB_SYSTEM_CLIENT_ID:-__datahub_system}:${DATAHUB_SYSTEM_CLIENT_SECRET:-JohnSnowKnowsNothing}"
{%- endraw %}
{%- if cloud_provider == "self-managed" %}
# Step 1: Create a job to transform the certificate into a Java truststore
- apiVersion: batch/v1
  kind: Job
  metadata:
    name: create-java-truststore
    namespace: "{{ namespace }}"
  spec:
    ttlSecondsAfterFinished: 3600
    template:
      spec:
        initContainers:
        - name: generate-truststore
          image: adoptopenjdk/openjdk11:alpine
          command:
          - /bin/sh
          - -c
          - |
            # Create directory for work
            mkdir -p /tmp/certs
            
            # Generate Java truststore from CA certificate
            echo "Creating Java truststore from CA certificate..."
            keytool -import -trustcacerts -file /etc/ssl/certs/ca.crt -alias devriv-ca -keystore /tmp/certs/truststore.jks -storepass $SSL_TRUSTSTORE_SECRET -noprompt
            
            # Verify the truststore
            echo "Verifying Java truststore contents:"
            keytool -list -keystore /tmp/certs/truststore.jks -storepass $SSL_TRUSTSTORE_SECRET
            
            echo "Truststore created at /tmp/certs/truststore.jks"
          volumeMounts:
          - name: ca-certs
            mountPath: /etc/ssl/certs
          - name: truststore-volume
            mountPath: /tmp/certs
          env:
          - name: SSL_TRUSTSTORE_SECRET
            valueFrom:
              secretKeyRef:
                name: data-governance-datahub-auth-secrets
                key: token_service_signing_key
        containers:
        - name: create-secret
          image: bitnamilegacy/kubectl:1.33.4
          command:
          - /bin/sh
          - -c
          - |
            echo "Creating Java truststore..."
            kubectl create secret generic data-governance-datahub-java-truststore \
              --from-file=/truststore/truststore.jks \
              --dry-run=client -o yaml | kubectl apply -f -
            echo "Truststore created and stored in 'java-truststore' secret"
          volumeMounts:
          - name: truststore-volume
            mountPath: /truststore
        volumes:
        - name: ca-certs
          csi:
            driver: csi.cert-manager.io
            readOnly: true
            volumeAttributes:
              csi.cert-manager.io/issuer-name: {{ customer }}-ca-issuer
              csi.cert-manager.io/issuer-kind: ClusterIssuer
              csi.cert-manager.io/mount-as: trusted-ca
        - name: truststore-volume
          emptyDir: {}
        restartPolicy: OnFailure
        serviceAccountName: truststore-creator  # This SA needs permission to create/update secrets
# Service account with permissions to create/update secrets
- apiVersion: v1
  kind: ServiceAccount
  metadata:
    name: truststore-creator
    namespace: "{{ namespace }}"
# Role with permissions to manage secrets
- apiVersion: rbac.authorization.k8s.io/v1
  kind: Role
  metadata:
    name: secret-manager
    namespace: "{{ namespace }}"
  rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
# RoleBinding to associate the role with the service account
- apiVersion: rbac.authorization.k8s.io/v1
  kind: RoleBinding
  metadata:
    name: truststore-creator-can-manage-secrets
    namespace: "{{ namespace }}"
  subjects:
  - kind: ServiceAccount
    name: truststore-creator
    namespace: "{{ namespace }}"
  roleRef:
    kind: Role
    name: secret-manager
    apiGroup: rbac.authorization.k8s.io
{%- endif %}
# Post-deploy job to run after the deployment
{%- if method == "local_vault" %}
- apiVersion: v1
  kind: Secret
  metadata:
    name: data-governance-post-deploy-vault-secrets
    namespace: "{{ namespace }}"
    labels:
      app: data-governance
      component: post-deploy
  type: Opaque
  stringData:
    vault.json: "{{ vault_secrets }}"
{%- endif %}
# Service account with permissions to create/update secrets
- apiVersion: v1
  kind: ServiceAccount
  metadata:
    name: data-governance-post-deploy-sa
    namespace: "{{ namespace }}"
- apiVersion: batch/v1
  kind: Job
  metadata:
    name: data-governance-post-deploy
    namespace: "{{ namespace }}"
    labels:
      app: data-governance
      component: post-deploy
  spec:
    ttlSecondsAfterFinished: 600
    backoffLimit: 10
    template:
      metadata:
        labels:
          app: data-governance
          component: post-deploy
      spec:
        initContainers:
        - name: init-wait
          image: busybox
          command: ['sh', '-c', 'echo "Waiting for 600 seconds before starting the job..." && sleep 600']
        containers:
        - name: data-governance-post-deploy
          image: 4fastbi/data-governance-hub-job:0.1.0
          imagePullPolicy: IfNotPresent
          env:
          # DataHub URL Configuration
          - name: DATAHUB_URL
            value: "http://data-governance-datahub-frontend.{{ namespace }}.svc.cluster.local"
          - name: DATAHUB_GSM_URL
            value: "http://data-governance-datahub-gms.{{ namespace }}.svc.cluster.local:8080"
          # Required parameters
          - name: BI_SYSTEM
            value: "{{ bi_system }}"
          - name: DATA_REPLICATION_DEFAULT_DESTINATION_TYPE
            value: "{{ data_replication_default_destination_type }}"
          - name: METHOD
            value: "{{ method }}"
          # Optional parameters for external vault
          - name: EXTERNAL_INFISICAL_HOST
            value: "{{ external_infisical_host | default('-') }}"
          - name: SLUG
            value: "{{ slug | default('-') }}"
          - name: CLIENT_ID
            value: "{{ client_id | default('-') }}"
          - name: CLIENT_SECRET
            value: "{{ client_secret | default('-') }}"
          - name: VAULT_PROJECT_ID
            value: "{{ vault_project_id | default('-') }}"
          # Optional parameters for local vault
          - name: SECRET_FILE
            value: "/vault/secrets/vault.json"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          volumeMounts:
          # Mount for vault secrets
          - name: vault-secrets
            mountPath: /vault/secrets
            readOnly: true
          # Mount for DataHub user credentials
          - name: datahub-user-creds
            mountPath: /var/run/secrets/kubernetes.io/data-governance/data-governance-datahub-auth-secrets
            readOnly: true
        volumes:
        # Volume for vault secrets
        - name: vault-secrets
          secret:
            secretName: data-governance-post-deploy-vault-secrets
        # Volume for DataHub user credentials
        - name: datahub-user-creds
          secret:
            secretName: data-governance-user-secret
            items:
            - key: user.props
              path: user.props
        restartPolicy: OnFailure
        serviceAccountName: data-governance-post-deploy-sa